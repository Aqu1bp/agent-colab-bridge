name: Bug report
description: Report a reproducible problem without sharing secrets.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include real tokens, Worker URLs, Cloudflare account IDs, Colab notebook output containing secrets, or private file contents.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use placeholder values for secrets and URLs.
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, Wrangler version, and whether this is a source checkout or packaged plugin.
    validations:
      required: true
